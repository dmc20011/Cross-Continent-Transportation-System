services:
  rabbitmq:
    image: rabbitmq
    ports:
      - "5672:5672"
    restart: unless-stopped

  shipmentdb:
    image: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: shipmentdb
    ports:
      - "3306:3306"
    volumes:
      - ./database/shipments.sql:/docker-entrypoint-initdb.d/shipments.sql
    restart: unless-stopped

  orderdb:
    image: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: orderdb
    ports:
      - "3307:3306"
    volumes:
      - ./database/orders.sql:/docker-entrypoint-initdb.d/orders.sql
    restart: unless-stopped

  trackdb:
    image: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: trackingdb
    ports:
      - "3308:3306"
    volumes:
      - ./database/tracking.sql:/docker-entrypoint-initdb.d/tracking.sql
    restart: unless-stopped

  routeservice:
    build:
      context: ./route
      no_cache: true
    depends_on:
      - rabbitmq
      - orderdb
      - shipmentdb
    restart: unless-stopped

  trackservice:
    build:
      context: ./track
      no_cache: true
    ports:
      - "80:80"
    environment:
      DB_HOST: trackdb
      DB_PASS: mypass
      DB_NAME: trackingdb
      DB_USER: root
      RABBITMQ_HOST: rabbitmq  
      MQ_USER: user
      MQ_PASS: pass
    depends_on:
      - rabbitmq
      - trackdb
    restart: unless-stopped
      

  consolidation:
    build:
      context: ./consolidation
      no_cache: true
    ports:
      - "5002:5002"
    environment:
      DB_HOST: shipmentdb
      DB_USER: root
      DB_PASS: mypass
      DB_NAME: shipmentdb
      RABBITMQ_HOST: rabbitmq
      MAX_WEIGHT_KG: 1000
      MAX_VOLUME_M3: 10
    depends_on:
      - rabbitmq
      - shipmentdb
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      no_cache: true
    ports:
      - 3000:3000
    environment:
      NEXT_PUBLIC_API: trackservice
    depends_on:
      - routeservice
      - consolidation
      - trackservice
      